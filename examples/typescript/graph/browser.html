<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>relateby-pattern Browser Example</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #1a1a1a; color: #e0e0e0; }
    h1 { color: #7ec8e3; }
    pre { background: #2a2a2a; padding: 1rem; border-radius: 4px; overflow-x: auto; }
    .success { color: #7ec87e; }
    .error { color: #e37e7e; }
    .info { color: #e3c87e; }
  </style>
</head>
<body>
  <h1>relateby-pattern Browser Example</h1>
  <p class="info">
    This example uses <code>@relateby/pattern</code> for Pattern values and
    <code>@relateby/graph</code> for the pure TypeScript graph helpers.
  </p>
  <pre id="output">Loading...</pre>

  <script type="module">
    const output = document.getElementById("output");
    const log = (msg, cls = "") => {
      const line = document.createElement("div");
      line.className = cls;
      line.textContent = msg;
      output.appendChild(line);
    };

    output.textContent = "";

    try {
      const { Pattern, Subject, Value } = await import("../../../typescript/packages/pattern/dist/index.js");
      const { filterGraph, mapGraph, SpliceGap, toGraphView } = await import("../../../typescript/packages/graph/dist/index.js");

      const alice = Pattern.point(Subject.fromId("alice").withLabel("Person"));
      const bob = Pattern.point(Subject.fromId("bob").withLabel("Person"));
      const company = Pattern.point(
        Subject.fromId("acme").withLabel("Company").withProperty(
          "active",
          Value.Bool({ value: true })
        )
      );

      const graph = {
        nodes: [alice, bob, company],
        relationships: [],
        walks: [],
        annotations: [],
        conflicts: {},
        size: 3,
        merge(other) {
          return {
            ...this,
            nodes: [...this.nodes, ...other.nodes],
            size: this.size + other.size,
          };
        },
        topoSort() {
          return this.nodes;
        },
      };

      const view = toGraphView(graph);
      log(`✓ Graph view contains ${view.viewElements.length} elements`, "success");

      const filtered = filterGraph(
        (_cls, pattern) => pattern.identity !== "acme",
        SpliceGap
      )(view);

      const mapped = mapGraph({
        mapNode: (pattern) =>
          new Pattern({
            ...pattern,
            value: pattern.value.withProperty("processed", Value.Bool({ value: true })),
          }),
      })(view);

      const filteredIds = filtered.viewElements.map(([, pattern]) => pattern.identity);
      const processedIds = mapped.viewElements.map(([, pattern]) => pattern.identity);

      log(`✓ Filtered identities: ${filteredIds.join(", ")}`, "success");
      log(`✓ Mapped identities: ${processedIds.join(", ")}`, "success");

      log("\nAll operations completed successfully!", "success");

    } catch (e) {
      log(`Error: ${e.message}`, "error");
      log("Make sure the packages are built first:", "info");
      log("  npm run build --workspace=@relateby/pattern", "info");
      log("  npm run build --workspace=@relateby/graph", "info");
      console.error(e);
    }
  </script>
</body>
</html>
