name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  rust-validation:
    name: Rust Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
          override: true
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --exclude pattern-wasm -- -D warnings
      - name: Build
        run: cargo build --workspace --exclude pattern-wasm
      - name: Test
        run: cargo test --workspace --exclude pattern-wasm
      - name: Docs
        run: cargo doc --no-deps -p relateby-pattern -p relateby-gram
      - name: Cargo publish dry-run
        run: |
          cargo publish -p relateby-pattern --dry-run
          cargo publish -p relateby-gram --dry-run

  wasm-validation:
    name: WASM Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --target wasm32-unknown-unknown --workspace

  npm-validation:
    name: npm Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-ts-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build @relateby/pattern
        run: npm run build --workspace=@relateby/pattern
      - name: Test @relateby/pattern
        run: npm run test --workspace=@relateby/pattern
      - name: Pack @relateby/pattern
        run: npm run pack:release --workspace=@relateby/pattern
      - name: Smoke-test packed npm artifact
        working-directory: scripts/release/npm-smoke
        run: |
          npm install --silent ../../../target/npm-packages/*.tgz
          npm run smoke

  python-validation:
    name: Python Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install build tooling
        run: pip install maturin twine
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-python-${{ hashFiles('**/Cargo.lock') }}
      - name: Build combined wheel
        working-directory: python/relateby
        run: python -m pip wheel . -w dist --no-deps
      - name: Check wheel metadata
        run: twine check python/relateby/dist/*
      - name: Smoke-test combined wheel
        run: bash scripts/release/smoke-python.sh --wheel python/relateby/dist/*.whl

